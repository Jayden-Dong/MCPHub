set_threshold: |
  1）点击方法，然后点击”打开采集方法“图标（图标形状：有个文件ico，然后有个向上的箭头）；
  2）接着打开这个采集方法：{}，不能直接输入路径，可能需要通过双击返回上一级路径的图标；
  3）等待采集方法调用成功后，点击“馏分收集器”，将第一列的阈值修改为{}，然后点击保存图标；
  
  备注：[方法]界面中包含多个图标，”常规“字样上方有4个图标，分别为：
  第一个图标为"创建新采集方法"（图标形状：有个文件ico，有＋箭头）；
  第二个为“打开采集方法”（图标位置在”创建新采集方法“图标右边，形状：有个文件ico，有个向上的箭头）；
  第三个为“保存采集方法方法”（图标位置在”打开采集方法“右边，为常见保存图标）；
  第四个为”将当前采集方法保存为新文件“（图标位置在”保存采集方法“右边）。
  

start_collect_protocol: |
  1）点击序列，然后点击“打开序列”的图标（图标形状：有个文件ico，然后有个向上的箭头）；
  2）接着打开这个序列：{}，不能直接输入路径，可能需要通过双击返回上一级路径的图标；
  3）等待序列调用成功后，在默认的结果名称改为：{}；
  4）点击右下角的"运行"按钮；
  
  备注：[序列]界面中包含多个图标，”常规“字样上方有4个图标，分别为：
  第一个图标为"创建新序列"（图标形状：有个文件ico，有＋箭头）；
  第二个为“打开序列”（图标位置在”创建新序列“图标右边，形状：有个文件ico，有个向上的箭头）；
  第三个为“保存序列”（图标位置在”打开序列“右边，为常见保存图标）；
  第四个为”将当前序列保存为新文件“（图标位置在”保存序列“右边）。

