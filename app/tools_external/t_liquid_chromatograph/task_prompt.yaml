get_protocol_status: |
  1）点击“状态”进入“状态”页面，页面显示仪器全部状态空闲，则当前脚本状态为Finished，否则为Running，结果存到protocol_status字段中；

get_purity: |
  1）点击“状态”（大图标，非小图标），然后点击”历史“，右键点击结果名称为：{} 的序列，在出现的目录中点击选择”在Data Analysis 中检查选定的运行；
  2）等待Data Analysis 软件开启，在进样结果中选择”峰面积 %", 输出最大峰面积的结果，结果保存到purity字段；
  3）关闭Data Analysis 页面，完成整个流程，注意：只需要关闭这一个页面，不要关闭别的页面；